<!DOCTYPE html>
<html lang="en">
<head>
  <title>Manazon - Magical Marketplace</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/shared/general.css" />
  <link rel="stylesheet" href="styles/manazon-header.css" />
  <link rel="stylesheet" href="styles/manazon.css" />
</head>
<body>
  <div class="manazon-header">
    <div class="manazon-header-left-section">
      <a href="manazon.html" class="header-link">
        <img class="manazon-logo" src="images/Manazon-logo.png" alt="Manazon" />
        <img class="manazon-mobile-logo" src="images/Manazon-logo.png" alt="Manazon" />
      </a>
    </div>

    <div class="manazon-header-middle-section">
      <input class="search-bar" type="text" placeholder="Search" />
      <button class="search-button" aria-label="Search">
        <img class="search-icon" src="images/icons/search-icon.png" alt="" />
      </button>
    </div>

    <div class="manazon-header-right-section">
      <a class="orders-link header-link" href="orders.html">
        <span class="returns-text">Returns</span>
        <span class="orders-text">&amp; Orders</span>
      </a>

      <a class="cart-link header-link" href="checkout.html">
        <img class="cart-icon" src="images/icons/cart-icon.png" alt="" />
        <div class="cart-quantity js-cart-quantity">0</div>
        <div class="cart-text">Cart</div>
      </a>
    </div>
  </div>

  <div class="main">
    <div class="search-filters">
      <div class="filter-section">
        <label for="sort-select" class="filter-label">Sort by:</label>
        <select id="sort-select" class="sort-select">
          <option value="name-asc">Name (A-Z)</option>
          <option value="name-desc">Name (Z-A)</option>
          <option value="price-low">Price (Low to High)</option>
          <option value="price-high">Price (High to Low)</option>
          <option value="rating">Highest Rated</option>
        </select>
      </div>
      
      <div class="filter-section">
        <label for="category-select" class="filter-label">Category:</label>
        <select id="category-select" class="category-select">
          <option value="all">All Items</option>
          <option value="wand">Wands</option>
          <option value="book">Books</option>
          <option value="ingredient">Ingredients</option>
          <option value="clothing">Clothing</option>
          <option value="creature">Creatures</option>
        </select>
      </div>
    </div>
    
    <div class="products-grid js-product-grid"></div>
  </div>

  <script type="module" src="scripts/manazon.js"></script>
</body>

</html>
